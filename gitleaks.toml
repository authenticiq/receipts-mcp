title = "StrataCodes OSS gitleaks config"

[extend]
useDefault = true

[allowlist]
description = "Known placeholder strings and public contact addresses"
regexes = [
  '''(?i)example(_|-)?(token|secret|key|api)''',
  '''(?i)not-a-real-(token|secret|key)''',
  '''support@strata\.codes''',
  '''security@strata\.codes'''
]
paths = [
  '''^LICENSE$''',
  '''^CODE_OF_CONDUCT\.md$'''
]